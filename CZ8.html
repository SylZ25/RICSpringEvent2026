<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CZ8 温馨提示 · 长洲笔记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #fafaf8;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.7;
            color: #1e1e1e;
            padding: 2rem 1rem;
        }
        .article {
            max-width: 680px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            padding: 2rem 1.8rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 1.5rem;
            line-height: 1.3;
            border-left: 4px solid #aaa28b;
            padding-left: 1rem;
        }
        .morse {
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 1.2rem;      /* 调小字号 */
            letter-spacing: 0.2rem;
            color: #9b6b43;
            text-align: center;
            margin: 1.5rem 0;
            word-break: break-all;
            line-height: 1.4;
        }
        .instruction {
            font-size: 1.2rem;
            font-weight: 500;
            text-align: center;
            background: #f0ede8;
            padding: 1.2rem;
            border-radius: 12px;
            margin: 2rem 0;
        }
        hr {
            border: none;
            border-top: 1px dashed #d0cdc5;
            margin: 2rem 0 1rem;
        }
        .footer-note {
            font-size: 0.85rem;
            color: #888;
            text-align: right;
            margin-top: 2rem;
            border-top: 1px solid #ecebe7;
            padding-top: 1rem;
        }
    </style>
</head>
<body>
<div class="article">
    <h1>CZ8 温馨提示</h1>

    <div class="morse">·---- ----· ··--- ···--</div>

    <p class="instruction">
        如果你发现了什么，就试着用CZEX+对应的题号+空格+你获得的线索来尝试获取对应的提示吧！
    </p>

    <div class="morse">·---- ----· ··--- ···--</div>

    <hr>
    <div class="footer-note">
        长洲 · 温馨提示<br>
        <span style="font-family: monospace;">✻ 待续 CZ9</span>
    </div>
</div>
</body>
</html>
